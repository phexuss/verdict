services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: verdict-api:latest
    container_name: verdict-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - verdict-net

networks:
  verdict-net:
    driver: bridge
